name: Kafka Microservices CI

on:
  push:
    branches:
      - main

jobs:
  build-services:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Order Service
        run: |
          cd orderservice
          mvn clean verify -DskipTests

      - name: Build Payment Service
        run: |
          cd paymentservice
          mvn clean verify -DskipTests

      - name: Build Notification Service
        run: |
          cd notificationservice
          mvn clean verify -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Order Service Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest ./orderservice

      - name: Build Payment Service Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service:latest ./paymentservice

      - name: Build Notification Service Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest ./notificationservice

      - name: Push Order Service Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      - name: Push Payment Service Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/payment-service:latest

      - name: Push Notification Service Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest